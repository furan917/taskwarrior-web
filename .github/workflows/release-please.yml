name: Release Please

# Maintains a "Release PR" on main: as conventional-commit messages land
# (feat:, fix:, perf:, etc.), the PR auto-updates with the next semver
# bump and the changelog. When you merge that PR, release-please tags
# the commit `vX.Y.Z` and creates a GitHub release - which then triggers
# build.yml to attach platform binaries.
#
# Basic config: release-type=go is the canned profile (no version-file
# wiring, no module-versioning subtleties). Customise via a manifest
# (.release-please-manifest.json) + config (release-please-config.json)
# in the repo root if you outgrow the defaults.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Single-package Go module. Override here when you split into
          # a monorepo (release-as: single -> manifest, etc.).
          release-type: go
          # Defaults to repo name; override only if you want a different
          # name in the changelog header.
          # package-name: taskwarrior-web-portal
